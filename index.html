<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#EFEFEF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Side A" />
    <link rel="apple-touch-icon" href="icons/icon-512.png" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png" />
    <title>Side A</title>
    <script>
      // Restore path from GitHub Pages 404 redirect
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Also handle ?p= query param from 404.html
        var search = location.search;
        if (search.slice(1,3) === 'p=') {
          var decoded = search.slice(3).replace(/~and~/g, '&');
          var qIndex = decoded.indexOf('&q=');
          var path = qIndex >= 0 ? decoded.slice(0, qIndex) : decoded;
          var query = qIndex >= 0 ? '?' + decoded.slice(qIndex + 3) : '';
          history.replaceState(null, null,
            '/' + path.replace(/^\//, '') + query + location.hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
